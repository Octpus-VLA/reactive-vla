[workspace]
authors = ["Masafumi Higashi <higashi-masafumi507@g.ecc.u-tokyo.ac.jp>"]
channels = ["conda-forge"]
name = "reactive-vla"
platforms = ["osx-arm64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[activation.env]
# HPCモジュール環境がLD_LIBRARY_PATHに古いシステムlibstdc++ (/lib64) を載せてくるため、
# conda env側のlibを優先させてGLIBCXX_3.4.30以降を要求するffmpeg/torchcodec等のロードを通す。
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"
# データセット/キャッシュを ~/.cache/huggingface ではなく workspace 配下に保存する。
# record/train/eval/replay/viz とも HF_LEROBOT_HOME を参照する (cli/so101.py の解決ロジック含む)。
HF_LEROBOT_HOME = "$PIXI_PROJECT_ROOT/datasets"

[tasks]
fmt = "ruff format ."
lint = "ruff check ."
fix = "ruff check --fix . && ruff format ."
verify = { cmd = "python -c \"import lerobot, scservo_sdk; print('lerobot', lerobot.__version__, '| feetech OK')\"" }
ffmpeg-version = "ffmpeg -version"
find-cameras = "lerobot-find-cameras"  # list connected cameras and save a sample image

# --- SO-101 arm workflow (register once by role, then no ports/ids needed) ---
set-port = "python cli/so101.py find-port"       # usage: pixi run set-port leader | follower
arms = "python cli/so101.py show"                # show registered arms
check = "python cli/so101.py check"              # usage: pixi run check leader | follower
set-camera = "python cli/so101.py set-camera"    # usage: pixi run set-camera front --index 0
setup-motors = "python cli/so101.py setup-motors"  # usage: pixi run setup-motors leader | follower
calibrate = "python cli/so101.py calibrate"      # usage: pixi run calibrate leader | follower
teleop = "python cli/so101.py teleop"            # uses both saved arms; no args needed

# --- Imitation-learning pipeline (record -> train -> eval) -------------------
hf-login = "python -c 'from huggingface_hub import login; login()'"  # log in before pushing datasets/policies
wandb-login = "python -m wandb login"                # log in before logging training runs to W&B
record = "python cli/so101.py record"            # usage: pixi run record --task "..." --repo-id name
replay = "python cli/so101.py replay"            # usage: pixi run replay --repo-id name --episode 0
viz = "python cli/so101.py viz"                  # usage: pixi run viz --repo-id name --episode 0
drop = "python cli/so101.py drop"                # usage: pixi run drop --repo-id name --episodes 0,2
upload = "python cli/so101.py upload"            # usage: pixi run upload --repo-id name  (existing local dataset)
train = "python cli/so101.py train"              # usage: pixi run train --repo-id name [--policy act | --policy-path lerobot/smolvla_base] [--wandb] [--push-repo-id name]
push-policy = "python cli/so101.py push-policy"  # usage: pixi run push-policy --checkpoint outputs/train/<job>/checkpoints/last --repo-id name
eval = "python cli/so101.py eval"                # usage: pixi run eval --policy <ckpt> --task "..." --repo-id eval_name
policy-test = "python cli/so101.py policy-test"  # offline inference smoke test (no robot needed)
sim-eval = "python cli/so101.py sim-eval"        # usage: pixi run sim-eval --policy <ckpt> --episodes 10 (MuJoCo sim, success rate / success step; add --repo-id rollout_<name> to also record video)
sim-collect = "python cli/so101.py sim-collect"  # usage: pixi run sim-collect --episodes 20 --repo-id sim_pickplace (scripted IK expert records MuJoCo pick-place demos for fine-tuning)

# Low-level fallback if you prefer raw lerobot port detection:
find-port = "lerobot-find-port"

[dependencies]
python = "3.12.*"
pip = "*"
setuptools = ">=71.0.0,<81.0.0"
packaging = ">=24.2,<26.0"
ruff = "*"
pyserial = ">=3.5,<4"
psutil = ">=7.2.2,<8"
ffmpeg = "*"


[pypi-dependencies]
lerobot = { path = "third_party/lerobot", editable = true, extras = ["feetech", "training", "smolvla", "hardware", "viz", "async"] }
torchcodec = ">=0.11.1, <0.12"
mujoco = ">=3.9.0, <4"
peft = ">=0.19.1, <0.20"
diffusers = ">=0.38.0, <0.39"
timm = ">=1.0.27, <2"
dm-tree = ">=0.1.10, <0.2"

# --- Docs site (MkDocs Material) ---------------------------------------------
# torch/lerobot を含めない軽量環境。ローカル: pixi run -e docs docs-serve
[feature.docs.dependencies]
python = "3.12.*"

[feature.docs.pypi-dependencies]
mkdocs-material = "*"
mkdocs-static-i18n = "*"

[feature.docs.tasks]
docs-serve = "mkdocs serve"          # ローカルプレビュー (http://127.0.0.1:8000)
docs-build = "mkdocs build --strict" # 本番ビルド (site/ に出力)

[environments]
docs = { features = ["docs"], no-default-feature = true }
